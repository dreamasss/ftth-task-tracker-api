services:
  db:
    image: postgres:16
    container_name: task_tracker_db
    environment:
      POSTGRES_DB: task_tracker
      POSTGRES_USER: task
      POSTGRES_PASSWORD: taskpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task -d task_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: task_tracker_api
    environment:
      DATABASE_URL: postgresql+psycopg://task:taskpass@db:5432/task_tracker
      TEST_DATABASE_URL: postgresql+psycopg://task:taskpass@db:5432/task_tracker_test
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app

volumes:
  pgdata:
