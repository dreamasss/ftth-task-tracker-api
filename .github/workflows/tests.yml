name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Start Docker services
        run: docker compose up -d --build

      - name: Check API health
        run: |
          for i in {1..30}; do
            if docker compose exec -T api curl -f http://localhost:8000/health/db; then
              echo "API is healthy"
              exit 0
            fi

            echo "API not ready yet, retrying..."
            sleep 2
          done

          echo "API did not become healthy in time"
          docker compose ps
          docker compose logs api
          exit 1

      - name: Run Ruff lint
        run: docker compose exec -T api ruff check .

      - name: Run Ruff format check
        run: docker compose exec -T api ruff format --check .

      - name: Reset test database
        run: |
          docker compose exec -T db sh -lc 'dropdb -U "$POSTGRES_USER" task_tracker_test || true'
          docker compose exec -T db sh -lc 'createdb -U "$POSTGRES_USER" task_tracker_test'

      - name: Run Alembic migrations on test database
        run: docker compose exec -T api sh -lc 'DATABASE_URL="$TEST_DATABASE_URL" alembic upgrade head'

      - name: Run tests
        run: docker compose exec -T api python -m pytest -q

      - name: Show logs on failure
        if: failure()
        run: docker compose logs
